openapi: 3.0.0
info:
  title: KrishiLink API
  description: Intelligent Farm Produce Transportation Platform
  version: 1.0.0
servers:
  - url: /api/v1
    description: V1 API

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

paths:
  /admin/auth/login:
    post:
      summary: Admin login
      tags:
        - Admin Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful
        '401':
          description: Invalid credentials
          
  /admin/dashboard:
    get:
      summary: Get admin dashboard data
      tags:
        - Admin Dashboard
      responses:
        '200':
          description: Dashboard data retrieved successfully
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /bookings:
    get:
      summary: List bookings
      tags:
        - Bookings
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
      responses:
        '200':
          description: A list of bookings

  /users:
    get:
      summary: List users (Admin)
      tags:
        - Users
      parameters:
        - name: role
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: A list of users
